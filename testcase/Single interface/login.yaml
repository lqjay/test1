- baseInfo:
    api_name: 用户登录
    url: /dar/user/login
    method: post
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 用例-登录失败
      data:
        user_name: test01AAA
        passwd: admin123AAA
      validation:
        - contains: { 'msg': '登录成功' }
        - contains: { 'status_code': 200 }
      extract:
        token: $.token
        userId: $.userId

    - case_name: 用例-登录成功
      data:
        user_name: test01
        passwd: admin123
      validation:
        - contains: { 'msg': '登录成功' }
        - contains: { 'status_code': 200 }
      extract:
        token: $.token
        userId: $.userId